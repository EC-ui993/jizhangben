<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📝 记账</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg">
</head>
<body>

  <!-- ==================== 应用主体 ==================== -->
  <div class="app-container" id="app">

    <!-- 顶部导航栏 -->
    <header class="header" id="header">
      <div class="period-nav">
        <button id="btnPrev" title="上一个周期">◀</button>
        <span class="period-title" id="periodTitle">今天</span>
        <span class="period-nav-right">
          <button id="btnNext" title="下一个周期" style="display:none;">▶</button>
          <button class="today-btn" id="btnToday">今天</button>
        </span>
      </div>

      <div class="period-tabs">
        <button class="period-tab active" data-period="day">📅 日</button>
        <button class="period-tab" data-period="week">📊 周</button>
        <button class="period-tab" data-period="month">📈 月</button>
      </div>
    </header>

    <!-- 总金额汇总栏 -->
    <div class="summary-bar" id="summaryBar">
      <div>
        <div class="summary-label">合计支出</div>
        <div class="summary-amount" id="totalAmount">¥0.00</div>
      </div>
      <div class="summary-count" id="totalCount">0 笔</div>
    </div>

    <!-- 主内容区 -->
    <div class="content" id="content"></div>

    <!-- 底部导航菜单栏 -->
    <nav class="bottom-nav">
      <a class="nav-tab active" href="record.html">
        <span class="nav-icon">📝</span>
        <span>记账</span>
      </a>
      <a class="nav-tab" href="categories.html">
        <span class="nav-icon">📂</span>
        <span>项目管理</span>
      </a>
      <a class="nav-tab" href="settings.html">
        <span class="nav-icon">⚙️</span>
        <span>设置</span>
      </a>
    </nav>
  </div>

  <!-- ==================== 记账弹窗 ==================== -->
  <div class="modal-overlay hidden" id="expenseModal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <div class="modal-title" id="expenseModalTitle">记录支出</div>

      <div class="modal-field">
        <label>分类</label>
        <div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg);border-radius:8px;">
          <span id="modalCatEmoji" style="font-size:20px;">🍚</span>
          <span id="modalCatName" style="font-weight:500;">午饭</span>
        </div>
      </div>

      <div class="modal-field">
        <label>金额 (元)</label>
        <input type="number" id="modalAmount" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
      </div>

      <div class="modal-field">
        <label>日期</label>
        <input type="date" id="modalDate">
      </div>

      <div class="modal-field">
        <label>备注（选填）</label>
        <input type="text" id="modalNote" placeholder="例如：和同事一起吃饭">
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" id="btnCancelExpense">取消</button>
        <button class="btn-primary" id="btnSaveExpense">保存</button>
      </div>
      <button class="btn-delete-item hidden" id="btnDeleteExpense">🗑 删除这条记录</button>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <!-- 共享数据层 -->
  <script src="data.js"></script>

  <script>
    /* ===================================================================
       记账页特有逻辑：周期导航、记账弹窗、支出列表渲染
       =================================================================== */

    // ---- 页面状态 ----
    let currentPeriod = 'day';
    let currentDate = new Date();
    let editingExpenseId = null;
    let selectedCategoryId = null;

    // ---- 周期导航 ----

    function changePeriod(delta) {
      const d = new Date(currentDate);
      if (currentPeriod === 'day') {
        d.setDate(d.getDate() + delta);
      } else if (currentPeriod === 'week') {
        d.setDate(d.getDate() + delta * 7);
      } else if (currentPeriod === 'month') {
        d.setMonth(d.getMonth() + delta);
      }
      currentDate = d;
      renderPage();
    }

    function goToToday() {
      currentDate = new Date();
      renderPage();
    }

    function setPeriod(period) {
      currentPeriod = period;
      renderPage();
    }

    function getPeriodTitle() {
      if (currentPeriod === 'day') {
        const today = getTodayStr();
        const cur = formatDate(currentDate);
        if (cur === today) return '今天';
        const yesterday = formatDate(new Date(Date.now() - 86400000));
        if (cur === yesterday) return '昨天';
        return cur;
      } else if (currentPeriod === 'week') {
        const ws = getWeekStart(currentDate);
        const we = getWeekEnd(currentDate);
        const fmt = (d) => `${d.getMonth() + 1}月${d.getDate()}日`;
        return fmt(ws) + ' - ' + fmt(we);
      } else {
        return currentDate.getFullYear() + '年' + (currentDate.getMonth() + 1) + '月';
      }
    }

    // ---- 页面渲染 ----

    function renderPage() {
      const title = getPeriodTitle();
      document.getElementById('periodTitle').textContent = title;

      // 右箭头：不在"今天"时显示
      const isToday = (currentPeriod === 'day' && formatDate(currentDate) === getTodayStr());
      document.getElementById('btnNext').style.display = isToday ? 'none' : '';

      document.querySelectorAll('.period-tab').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.period === currentPeriod);
      });

      renderRecordTab();
    }

    function renderRecordTab() {
      const content = document.getElementById('content');
      const periodExpenses = getExpensesInPeriod(currentPeriod, currentDate);
      const total = calcTotal(periodExpenses);

      document.getElementById('totalAmount').textContent = formatMoney(total);
      document.getElementById('totalAmount').classList.toggle('over-budget',
        monthlyBudget > 0 && total > monthlyBudget);
      document.getElementById('totalCount').textContent = periodExpenses.length + ' 笔';

      const grouped = {};
      periodExpenses.forEach(e => {
        if (!grouped[e.date]) grouped[e.date] = [];
        grouped[e.date].push(e);
      });

      const sortedDates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

      let html = '';

      // 分类快捷记账网格
      html += '<div class="category-section">';
      html += '<div class="section-title">💡 点击分类快速记账</div>';
      html += '<div class="category-grid">';
      getSortedCategories().forEach((cat, index) => {
        const isOthers = cat.name === '其他';
        html += `
          <div class="category-item" data-action="record" data-category-id="${cat.id}" data-cat-index="${isOthers ? '' : index}">
            <span class="category-emoji">${cat.emoji}</span>
            <span class="category-name">${cat.name}</span>
          </div>`;
      });
      html += '</div></div>';

      // 支出明细列表
      html += '<div class="expense-section">';
      html += '<div class="section-title">📋 支出明细</div>';

      if (sortedDates.length === 0) {
        html += `
          <div class="empty-state">
            <div class="icon">📭</div>
            <div class="text">这个周期还没有支出记录<br>点击上方分类开始记账吧</div>
          </div>`;
      } else {
        sortedDates.forEach(dateStr => {
          const dayTotal = calcTotal(grouped[dateStr]);
          const d = parseDate(dateStr);
          const weekDay = ['日','一','二','三','四','五','六'][d.getDay()];
          html += `
            <div class="date-group-header">
              <span>📅 ${dateStr} 星期${weekDay}</span>
              <span class="date-group-total">${formatMoney(dayTotal)}</span>
            </div>`;

          const sorted = [...grouped[dateStr]].sort((a, b) => b.id.localeCompare(a.id));
          sorted.forEach(exp => {
            html += `
              <div class="expense-item" data-action="edit-expense" data-expense-id="${exp.id}">
                <div class="expense-icon">${exp.categoryEmoji}</div>
                <div class="expense-info">
                  <div class="expense-category">${exp.categoryName}</div>
                  ${exp.note ? `<div class="expense-note">${escapeHtml(exp.note)}</div>` : ''}
                </div>
                <span class="expense-amount">${formatMoney(exp.amount)}</span>
                <button class="expense-delete" data-action="delete-expense" data-expense-id="${exp.id}" title="删除">×</button>
              </div>`;
          });
        });
      }
      html += '</div>';

      content.innerHTML = html;
    }

    // ---- 记账弹窗 ----

    function showExpenseModal(categoryId) {
      editingExpenseId = null;
      selectedCategoryId = categoryId;

      const cat = findCategory(categoryId);
      document.getElementById('expenseModalTitle').textContent = '记录支出';
      document.getElementById('modalCatEmoji').textContent = cat ? cat.emoji : '📌';
      document.getElementById('modalCatName').textContent = cat ? cat.name : '未知';
      document.getElementById('modalAmount').value = '';
      document.getElementById('modalDate').value = getTodayStr();
      document.getElementById('modalNote').value = '';
      document.getElementById('btnDeleteExpense').classList.add('hidden');

      document.getElementById('expenseModal').classList.remove('hidden');
      setTimeout(() => document.getElementById('modalAmount').focus(), 300);
    }

    function showEditExpenseModal(expenseId) {
      const exp = expenses.find(e => e.id == expenseId);
      if (!exp) return;

      editingExpenseId = expenseId;
      selectedCategoryId = exp.categoryId;

      document.getElementById('expenseModalTitle').textContent = '编辑支出';
      document.getElementById('modalCatEmoji').textContent = exp.categoryEmoji;
      document.getElementById('modalCatName').textContent = exp.categoryName;
      document.getElementById('modalAmount').value = exp.amount;
      document.getElementById('modalDate').value = exp.date;
      document.getElementById('modalNote').value = exp.note || '';
      document.getElementById('btnDeleteExpense').classList.remove('hidden');

      document.getElementById('expenseModal').classList.remove('hidden');
    }

    function hideExpenseModal() {
      document.getElementById('expenseModal').classList.add('hidden');
      editingExpenseId = null;
      selectedCategoryId = null;
    }

    function saveExpenseFromModal() {
      const amountStr = document.getElementById('modalAmount').value;
      const dateVal = document.getElementById('modalDate').value;
      const note = document.getElementById('modalNote').value.trim();
      const amount = parseFloat(amountStr);

      if (isNaN(amount) || amount < 0) { showToast('请输入有效的金额'); return; }
      if (!dateVal) { showToast('请选择日期'); return; }

      const cat = findCategory(selectedCategoryId);
      if (!cat) { showToast('分类不存在，请重新选择'); return; }

      if (editingExpenseId) {
        const exp = expenses.find(e => e.id == editingExpenseId);
        if (exp) {
          exp.categoryId = cat.id;
          exp.categoryName = cat.name;
          exp.categoryEmoji = cat.emoji;
          exp.amount = Math.round(amount * 100) / 100;
          exp.date = dateVal;
          exp.note = note;
        }
      } else {
        expenses.push({
          id: generateId(),
          categoryId: cat.id,
          categoryName: cat.name,
          categoryEmoji: cat.emoji,
          amount: Math.round(amount * 100) / 100,
          date: dateVal,
          note: note,
        });
      }

      saveExpenses();
      hideExpenseModal();
      renderPage();
      showToast(editingExpenseId ? '已更新 ✓' : '已记录 ✓');
    }

    function deleteExpenseFromModal() {
      if (!editingExpenseId) return;
      if (!confirm('确定要删除这条支出记录吗？此操作不可恢复。')) return;

      expenses = expenses.filter(e => e.id != editingExpenseId);
      saveExpenses();
      hideExpenseModal();
      renderPage();
      showToast('已删除');
    }

    function deleteExpense(expenseId) {
      if (!confirm('确定要删除这条支出记录吗？')) return;
      expenses = expenses.filter(e => e.id != expenseId);
      saveExpenses();
      renderPage();
      showToast('已删除');
    }

    // ---- 拖拽排序（网格） ----

    const drag = {
      active: false, fromIdx: -1, toIdx: -1,
      startX: 0, startY: 0,
      timer: null, el: null, items: [],
    };

    function getGridItems() {
      return [...document.querySelectorAll('.category-item[data-cat-index]:not([data-cat-index=""])')];
    }

    function getGridTargetIndex(clientX, clientY) {
      const items = getGridItems();
      let bestIdx = drag.fromIdx;
      let bestDist = Infinity;
      items.forEach((item, i) => {
        const r = item.getBoundingClientRect();
        const cx = r.left + r.width / 2;
        const cy = r.top + r.height / 2;
        const dist = Math.hypot(clientX - cx, clientY - cy);
        if (dist < bestDist) { bestDist = dist; bestIdx = i; }
      });
      return bestIdx;
    }

    function activateGridDrag() {
      drag.active = true;
      drag.el.classList.add('drag-active');
      drag.items = getGridItems();
      if (navigator.vibrate) navigator.vibrate(10);
    }

    function updateGridPosition(clientX, clientY) {
      const newIdx = getGridTargetIndex(clientX, clientY);
      if (newIdx !== drag.toIdx) {
        drag.toIdx = newIdx;
        drag.items.forEach((item, i) => {
          item.classList.remove('drag-target');
          if (i === newIdx && i !== drag.fromIdx) {
            item.classList.add('drag-target');
          }
        });
      }
    }

    function commitGridReorder() {
      if (drag.toIdx >= 0 && drag.toIdx !== drag.fromIdx) {
        moveCategory(drag.fromIdx, drag.toIdx);
        renderPage();
        showToast('顺序已调整 ✓');
      }
    }

    function deactivateGridDrag() {
      drag.active = false;
      drag.fromIdx = -1;
      drag.toIdx = -1;
      if (drag.el) drag.el.classList.remove('drag-active');
      drag.el = null;
      drag.items.forEach(i => i.classList.remove('drag-target'));
      drag.items = [];
    }

    // ---- 事件绑定 ----

    function init() {
      loadData();
      renderPage();

      // 顶部导航
      document.getElementById('btnPrev').addEventListener('click', () => changePeriod(-1));
      document.getElementById('btnNext').addEventListener('click', () => changePeriod(1));
      document.getElementById('btnToday').addEventListener('click', goToToday);
      document.getElementById('periodTitle').addEventListener('click', goToToday);

      document.querySelectorAll('.period-tab').forEach(btn => {
        btn.addEventListener('click', () => setPeriod(btn.dataset.period));
      });

      const content = document.getElementById('content');

      // 长按拖拽（网格）
      content.addEventListener('touchstart', function(e) {
        if (drag.active) return;
        const item = e.target.closest('.category-item');
        if (!item || !item.dataset.catIndex || item.dataset.catIndex === '') return;

        drag.fromIdx = parseInt(item.dataset.catIndex);
        drag.toIdx = drag.fromIdx;
        drag.startX = e.touches[0].clientX;
        drag.startY = e.touches[0].clientY;
        drag.el = item;

        drag.timer = setTimeout(() => activateGridDrag(), 500);
      });

      content.addEventListener('touchmove', function(e) {
        if (!drag.timer && !drag.active) return;
        const dx = e.touches[0].clientX - drag.startX;
        const dy = e.touches[0].clientY - drag.startY;

        if (!drag.active) {
          if (Math.abs(dx) > 15 || Math.abs(dy) > 15) {
            clearTimeout(drag.timer);
            drag.timer = null;
          }
          return;
        }

        e.preventDefault();
        updateGridPosition(e.touches[0].clientX, e.touches[0].clientY);
      }, { passive: false });

      content.addEventListener('touchend', function(e) {
        clearTimeout(drag.timer);
        drag.timer = null;
        if (drag.active) {
          commitGridReorder();
          deactivateGridDrag();
        }
      });

      content.addEventListener('touchcancel', function(e) {
        clearTimeout(drag.timer);
        drag.timer = null;
        if (drag.active) deactivateGridDrag();
      });

      // 鼠标拖拽（桌面端）
      content.addEventListener('mousedown', function(e) {
        if (drag.active) return;
        const item = e.target.closest('.category-item');
        if (!item || !item.dataset.catIndex || item.dataset.catIndex === '') return;

        drag.fromIdx = parseInt(item.dataset.catIndex);
        drag.toIdx = drag.fromIdx;
        drag.startX = e.clientX;
        drag.startY = e.clientY;
        drag.el = item;

        drag.timer = setTimeout(() => activateGridDrag(), 500);
      });

      document.addEventListener('mousemove', function(e) {
        if (!drag.timer && !drag.active) return;
        const dx = e.clientX - drag.startX;
        const dy = e.clientY - drag.startY;

        if (!drag.active) {
          if (Math.abs(dx) > 15 || Math.abs(dy) > 15) {
            clearTimeout(drag.timer);
            drag.timer = null;
          }
          return;
        }

        e.preventDefault();
        updateGridPosition(e.clientX, e.clientY);
      });

      document.addEventListener('mouseup', function(e) {
        clearTimeout(drag.timer);
        drag.timer = null;
        if (drag.active) {
          commitGridReorder();
          deactivateGridDrag();
        }
      });

      // 内容区事件委托
      content.addEventListener('click', (e) => {
        const target = e.target.closest('[data-action]');
        if (!target) return;
        const action = target.dataset.action;

        if (action === 'record') {
          showExpenseModal(target.dataset.categoryId);
        } else if (action === 'edit-expense') {
          if (e.target.closest('[data-action="delete-expense"]')) return;
          showEditExpenseModal(target.dataset.expenseId);
        } else if (action === 'delete-expense') {
          e.stopPropagation();
          deleteExpense(target.dataset.expenseId);
        }
      });

      // 记账弹窗
      document.getElementById('btnSaveExpense').addEventListener('click', saveExpenseFromModal);
      document.getElementById('btnCancelExpense').addEventListener('click', hideExpenseModal);
      document.getElementById('btnDeleteExpense').addEventListener('click', deleteExpenseFromModal);
      document.getElementById('expenseModal').addEventListener('click', function(e) {
        if (e.target === this) hideExpenseModal();
      });
      document.getElementById('modalAmount').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') saveExpenseFromModal();
      });
    }

    document.addEventListener('DOMContentLoaded', init);
    console.log('📝 记账页面已就绪！');
  </script>
</body>
</html>
